name: Build & Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            bin: code-sage
            setup: bash third_party/scripts/setup_deps.sh
          - os: macos-13
            target: darwin-x64
            bin: code-sage
            setup: bash third_party/scripts/setup_deps.sh
          - os: ubuntu-22.04
            target: linux-x64
            bin: code-sage
            setup: bash third_party/scripts/setup_deps.sh
          - os: windows-2022
            target: win32-x64
            bin: code-sage.exe
            setup: powershell -ExecutionPolicy Bypass -File third_party/scripts/setup_deps_win.ps1

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache third_party
        uses: actions/cache@v4
        with:
          path: third_party
          key: deps-${{ matrix.target }}-${{ hashFiles('third_party/scripts/*') }}
          restore-keys: deps-${{ matrix.target }}-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Setup dependencies
        run: ${{ matrix.setup }}

      - name: Build analyzer
        shell: bash
        run: |
          cd analyzer
          mkdir -p build && cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=OFF
            cmake --build . --config Release --target code-sage
            cp Release/code-sage.exe code-sage.exe 2>/dev/null || true
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
            cmake --build . --target code-sage -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          fi

      - name: Install extension dependencies
        working-directory: extension
        run: npm install

      - name: Compile extension
        working-directory: extension
        run: npm run compile

      - name: Build webview
        working-directory: extension/webview
        run: |
          npm install
          npm run build

      - name: Build backend
        working-directory: backend
        run: |
          npm install
          npm run build

      - name: Bundle backend
        working-directory: extension
        run: node scripts/bundle-backend.js

      - name: Copy analyzer binary
        shell: bash
        run: |
          mkdir -p extension/bin
          cp analyzer/build/${{ matrix.bin }} extension/bin/${{ matrix.bin }}
          chmod +x extension/bin/${{ matrix.bin }} 2>/dev/null || true

      - name: Package VSIX
        working-directory: extension
        run: npx vsce package --target ${{ matrix.target }} --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: codesage-${{ matrix.target }}
          path: extension/*.vsix

      - name: Cleanup bundled files
        shell: bash
        run: rm -rf extension/backend extension/bin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vsix-artifacts/**/*.vsix
          generate_release_notes: true
